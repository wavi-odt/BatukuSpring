spring.application.name=batuku


spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/batuku
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASS:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG


jwt.secret=${JWT_SECRET}


batuku.cors.allowed-origin=http://localhost:5173

# File upload limits
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# Storage abstraction
batuku.storage.type=local

# Local (dev)
batuku.storage.local.base-dir=./uploads
batuku.storage.local.public-base-url=http://localhost:8080/uploads

# S3-compatible (Cloudflare R2)
batuku.storage.s3.endpoint=${STORAGE_S3_ENDPOINT:}
batuku.storage.s3.region=${STORAGE_S3_REGION:auto}
batuku.storage.s3.access-key=${STORAGE_S3_ACCESS_KEY:}
batuku.storage.s3.secret-key=${STORAGE_S3_SECRET_KEY:}
batuku.storage.s3.avatar-bucket=${STORAGE_S3_AVATAR_BUCKET:batuku-avatars}
batuku.storage.s3.audio-bucket=${STORAGE_S3_AUDIO_BUCKET:batuku-audio}
batuku.storage.s3.avatar-public-base-url=${STORAGE_S3_AVATAR_PUBLIC_URL:}
batuku.storage.s3.audio-presign-minutes=15

# Google  (substitui CONFIGURE_ME pelos valores reais do Google Cloud Console)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# Discord  (substitui CONFIGURE_ME pelos valores do Discord Developer Portal)
spring.security.oauth2.client.registration.discord.client-id=${DISCORD_CLIENT_ID}
spring.security.oauth2.client.registration.discord.client-secret=${DISCORD_CLIENT_SECRET}
spring.security.oauth2.client.registration.discord.scope=identify,email
spring.security.oauth2.client.registration.discord.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.discord.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.discord.client-name=Discord
spring.security.oauth2.client.registration.discord.client-authentication-method=client_secret_post

spring.security.oauth2.client.provider.discord.authorization-uri=https://discord.com/api/oauth2/authorize
spring.security.oauth2.client.provider.discord.token-uri=https://discord.com/api/oauth2/token
spring.security.oauth2.client.provider.discord.user-info-uri=https://discord.com/api/users/@me
spring.security.oauth2.client.provider.discord.user-name-attribute=id

# URL do frontend para receber o JWT para OAuth2
app.oauth2.redirect-uri=http://localhost:5173/oauth2/callback

# Spotify API
batuku.spotify.client-id=${SPOTIFY_CLIENT_ID:}
batuku.spotify.client-secret=${SPOTIFY_CLIENT_SECRET:}
batuku.spotify.market=PT

# Discord Bot
batuku.discord.bot-token=${DISCORD_BOT_TOKEN:}
batuku.discord.webhook-url=${DISCORD_WEBHOOK_URL:}
batuku.discord.webhook-secret=${DISCORD_WEBHOOK_SECRET:}
batuku.discord.guild-id=${DISCORD_GUILD_ID:}

# URL base do frontend (usada nos links dos embeds)
batuku.app.base-url=${APP_BASE_URL:http://localhost:5173}